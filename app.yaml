runtime: go125
instance_class: F1
main: ./cmd/server

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 5

includes:
  - env_variables.yaml

handlers:
- url: /style.css
  static_files: web/style.css
  upload: web/style.css
  secure: always

- url: /app.js
  static_files: web/app.js
  upload: web/app.js
  secure: always

- url: /$
  static_files: web/index.html
  upload: web/index.html
  secure: always

- url: /.*
  script: auto
  secure: always
