<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, lightweight dashboard to monitor real-time API quota utilization and agent telemetry for Antigravity.">
    <title>Antigravity Quota Dashboard</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="elm-app"></div>
    
    <!-- Application Script -->
    <script src="/app.js"></script>
    <script>
        const app = Elm.Main.init({
            node: document.getElementById('elm-app'),
            flags: {
                apiKey: localStorage.getItem('agentic_quota_api_key') || '',
                autoRefresh: parseInt(localStorage.getItem('agentic_quota_refresh') || '30')
            }
        });

        app.ports.saveApiKey.subscribe(function(data) {
            if (data.key) {
                localStorage.setItem('agentic_quota_api_key', data.key);
            } else {
                localStorage.removeItem('agentic_quota_api_key');
            }
        });

        app.ports.saveAutoRefresh.subscribe(function(val) {
            localStorage.setItem('agentic_quota_refresh', val.toString());
        });

        let isHovering = false;
        document.body.addEventListener('mousemove', function(e) {
            const svg = e.target.closest('.chart-svg');
            if (svg) {
                const rect = svg.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const svgX = (mouseX / rect.width) * 800;
                isHovering = true;
                app.ports.onChartMouseMove.send(svgX);
            } else {
                if (isHovering) {
                    isHovering = false;
                    app.ports.onChartMouseLeave.send(null);
                }
            }
        });

        document.body.addEventListener('mouseleave', function(e) {
            if (isHovering) {
                isHovering = false;
                app.ports.onChartMouseLeave.send(null);
            }
        });
    </script>
</body>
</html>
