name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3, verified via git ls-remote

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0, verified via git ls-remote
        with:
          go-version: '1.25.8'

      - name: Verify Formatter and Linting
        run: |
          go fmt ./...
          go vet ./...

      - name: Install Elm
        run: |
          curl -L -o elm.gz "https://github.com/elm/compiler/releases/download/0.19.1/binary-for-linux-64-bit.gz"
          gunzip elm.gz
          chmod +x elm
          sudo mv elm /usr/local/bin/elm

      - name: Compile Elm Frontend
        run: elm make src/Main.elm --output=web/app.js --optimize

      - name: Upload compiled Frontend JS Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2, verified via git ls-remote
        with:
          name: app-js
          path: web/app.js

      - name: Run Tests
        run: go test -v ./...

