name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3, verified via git ls-remote

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0, verified via git ls-remote
        with:
          go-version: '1.22'

      - name: Verify Formatter and Linting
        run: |
          go fmt ./...
          go vet ./...

      - name: Run Tests
        run: go test -v ./...
